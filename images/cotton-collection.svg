<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img" aria-label="Cotton collection fabric illustration">
  <rect width="800" height="520" fill="#f7f3e7"/>
  <rect x="0" y="0" width="800" height="520" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9f5e8"/>
      <stop offset="100%" stop-color="#e8dcc2"/>
    </linearGradient>
    <pattern id="weave" width="80" height="80" patternUnits="userSpaceOnUse">
